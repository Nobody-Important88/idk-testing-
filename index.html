<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System - Search Directory</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>
    <style> * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }


        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }


        .main-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            gap: 20px;
        }


        .sidebar {
            width: 280px;
            background: white;
            border: 1px solid #ddd;
            padding: 20px;
            height: fit-content;
            position: sticky;
            top: 20px;
        }


        .sidebar h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.2em;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }


        .filter-group {
            margin-bottom: 20px;
        }


        .filter-group h3 {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
            text-transform: uppercase;
        }


        .filter-button {
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 5px;
            background: #333;
            color: white;
            border: none;
            cursor: pointer;
            text-align: left;
            font-size: 0.9em;
        }


        .filter-button:hover {
            background: #555;
        }


        .reset-button {
            background: #d32f2f;
        }


        .reset-button:hover {
            background: #b71c1c;
        }


        select.filter-select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            background: white;
            font-size: 0.9em;
            margin-bottom: 5px;
        }


        .container {
            flex: 1;
            background: white;
            border: 1px solid #ddd;
            padding: 30px;
        }


        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2em;
        }


        h2{
            text-align: center;
             margin-bottom: 20px;
        }
        .filter-info {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 15px;
            margin-bottom: 20px;
            color: #333;
        }


        .filter-info strong {
            color: #1976d2;
        }


        .search-container {
            margin-bottom: 20px;
            text-align: center;
        }


        .search-bar {
            width: 100%;
            max-width: 500px;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ddd;
        }


        .employees-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }


        .employee-card {
            background: #f9f9f9;
            border: 1px solid #ddd;
            padding: 15px;
        }


        .employee-card h3 {
            margin-bottom: 10px;
            color: #333;
        }


        .employee-card p {
            margin: 5px 0;
            color: #666;
            font-size: 0.9em;
        }


        .employee-card .badge {
            display: inline-block;
            background: #333;
            color: white;
            padding: 5px 10px;
            margin-top: 10px;
            font-size: 0.85em;
        }


        .employee-card.minimal {
            background: #e8f5e9;
        }


        .no-results {
            text-align: center;
            padding: 40px;
            color: #666;
        }


     
        .result-box {
            grid-column: 1/-1;
            background: #333;
            color: white;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
        }


        .result-box h2 {
            font-size: 2em;
            margin-bottom: 15px;
        }


        .result-box p {
            font-size: 1.3em;
        }


        .welcome-box {
            grid-column: 1/-1;
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }


        .welcome-box h2 {
            font-size: 2em;
            margin-bottom: 15px;
            color: #333;
        }


        .welcome-box p {
            font-size: 1.1em;
        }


        @media (max-width: 968px) {
            .main-wrapper {
                flex-direction: column;
            }


            .sidebar {
                width: 100%;
                position: relative;
            }
        }

</style>
    
   
</head>
<body>
    <div class="main-wrapper">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <h2>🔍 Filter Employees</h2>
           
            <div class="filter-group">
                <h3>Array Methods</h3>
                <button class="filter-button" onclick="question1()">Q1: includes() - Check Marketing exists</button>
                <button class="filter-button" onclick="question2()">Q2: indexOf() - Find David Kim</button>
                <button class="filter-button" onclick="question3()">Q3: find() - First Marketing employee</button>
                <button class="filter-button" onclick="question4()">Q4: findIndex() - Find ID 104</button>
                <button class="filter-button" onclick="question5()">Q5: some() - Any > 7 years exp?</button>
                <button class="filter-button" onclick="question6()">Q6: every() - All Eng remote?</button>
                <button class="filter-button" onclick="question7()">Q7: filter() - Remote & > $80k</button>
                <button class="filter-button" onclick="question8()">Q8: map() - Name & Email only</button>
                <button class="filter-button" onclick="question9()">Q9: join() - Unique departments</button>
                <button class="filter-button" onclick="question10()">Q10: concat() - Add new hires</button>
            </div>


            <div class="filter-group">
                <h3>Bonus Challenges</h3>
                <button class="filter-button" onclick="bonus1()">Bonus 1: JavaScript developers</button>
                <button class="filter-button" onclick="bonus2()">Bonus 2: Remote 4+ years?</button>
                <button class="filter-button" onclick="bonus3()">Bonus 3: Unique skills list</button>
                <button class="filter-button" onclick="bonus4()">Bonus 4: Engineering total salary</button>
            </div>


            <div class="filter-group">
                <h3>Quick Filters</h3>
                <button class="filter-button" onclick="showAllEmployees()" style="background: #2196f3; font-weight: bold;">
                    📋 Show All Employees
                </button>
            </div>


        </aside>


        <div class="container">
            <h1>🏢 Employee Management System </h1>
            <h2> Search Directory</h2>
           
            <div class="filter-info" id="filterInfo">
                <strong>Welcome!</strong>, Select a filter from the sidebar to view employees
            </div>
           
            <div class="employees-grid" id="employeesGrid"></div>
         </div>


    </div>


</body>
</html>
